kind = "web"
previewPath = "/marketing/"
title = "Vaqit — Marketing Site"
version = "1.0.0"
id = "artifacts/marketing"
router = "path"

[[services]]
name = "web"
paths = [ "/marketing/" ]
localPort = 22813

[services.development]
run = "pnpm --filter @workspace/marketing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/marketing", "run", "build" ]
serve = "static"
publicDir = "artifacts/marketing/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22813"
BASE_PATH = "/marketing/"
